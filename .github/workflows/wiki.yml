name: Publish Wiki

on:
  workflow_dispatch:   # manual trigger
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'

permissions:
  contents: write

jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Publish wiki pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          # Clone or init the wiki repo
          if git clone "$WIKI_URL" wiki-out 2>/dev/null; then
            echo "Cloned existing wiki"
          else
            echo "Initializing new wiki"
            mkdir wiki-out
            cd wiki-out
            git init
            git remote add origin "$WIKI_URL"
            cd ..
          fi

          # Copy docs/wiki/ content into wiki repo root
          cp docs/wiki/*.md wiki-out/

          cd wiki-out
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "docs: update wiki from docs/wiki/"
            git push origin HEAD:master
            echo "Wiki pushed successfully"
          fi
