name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One run at a time — mirrors Jenkins disableConcurrentBuilds()
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

# Skip the redundant run triggered by the version-bump commit itself
jobs:
  pipeline:
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: '0'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # Stage: Checkout
      # ─────────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags needed for version calc
          token: ${{ secrets.GH_PAT }}   # allows pushing back the version bump

      # ─────────────────────────────────────────────────────────────────────
      # Go toolchain
      # ─────────────────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Format
      # ─────────────────────────────────────────────────────────────────────
      - name: Format
        run: |
          unformatted=$(find . -name "*.go" \
              -not -path "./.gopath/*" \
              -not -path "./.gocache/*" \
              -not -path "./vendor/*" \
              | xargs gofmt -l)
          if [ -n "$unformatted" ]; then
              echo "Not gofmt-clean:"
              echo "$unformatted"
              exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Vet
      # ─────────────────────────────────────────────────────────────────────
      - name: Vet
        run: go vet ./...

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Test
      # ─────────────────────────────────────────────────────────────────────
      - name: Test
        run: |
          set -o pipefail
          go test ./... -v -count=1 2>&1 | tee test-results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Release Version  (main branch only)
      # Runs only after Format/Vet/Test gates pass, so a broken commit can
      # never receive a version bump or be pushed back to main.
      # Computes next version, updates Makefile / man page / README,
      # commits [ci skip] and pushes, exports RELEASE_VERSION for later steps.
      # ─────────────────────────────────────────────────────────────────────
      - name: Release Version
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e

          # Resolve version: use tag on HEAD, else auto-bump patch.
          tag=$(git tag --points-at HEAD --list 'v*' \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V | tail -1)
          if [ -n "$tag" ]; then
              VERSION="${tag#v}"
          else
              latest=$(git tag --list 'v*' \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | sort -V | tail -1)
              latest="${latest:-v0.0.0}"
              v="${latest#v}"
              major="${v%%.*}"; rest="${v#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
              VERSION="${major}.${minor}.$((patch + 1))"
          fi
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Release version: v${VERSION}"

          TODAY="$(date +%Y-%m-%d)"
          sed -i "s/^VERSION ?= .*/VERSION ?= ${VERSION}/" Makefile
          sed -i "s/\.TH GHOSTSHELL 1 \"[^\"]*\" \"ghostshell [0-9.]*\"/.TH GHOSTSHELL 1 \"${TODAY}\" \"ghostshell ${VERSION}\"/" man/ghostshell.1
          sed -i \
              -e "s|releases/download/v[0-9]*\.[0-9]*\.[0-9]*|releases/download/v${VERSION}|g" \
              -e "s|ghostshell_[0-9]*\.[0-9]*\.[0-9]*|ghostshell_${VERSION}|g" \
              -e "s|ghostshell-[0-9]*\.[0-9]*\.[0-9]*|ghostshell-${VERSION}|g" \
              README.md

          if git diff --quiet -- Makefile man/ghostshell.1 README.md; then
              echo "Versioned files already match v${VERSION}"
          else
              git config user.name  "ghostshell CI"
              git config user.email "noreply@ghostshell.invalid"
              git add Makefile man/ghostshell.1 README.md
              git commit -m "chore: set release version v${VERSION} [ci skip]"
              git push origin HEAD:main
          fi

      # Export version for non-main builds (PR): read from Makefile
      - name: Read Version (PR)
        if: github.ref != 'refs/heads/main'
        run: |
          VERSION=$(grep -E '^VERSION \?=' Makefile | head -1 | sed 's/VERSION ?= //')
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Release version: v${VERSION} (from Makefile, PR build)"

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Build
      # ─────────────────────────────────────────────────────────────────────
      - name: Build
        run: |
          mkdir -p build bin
          go build -ldflags "-X main.Version=${RELEASE_VERSION}" -o build/ghostshell  ./cmd/ghostshell/
          go build -o build/ghostshell-daemon ./cmd/ghostshell-daemon/
          cp build/ghostshell  bin/ghostshell
          cp build/ghostshell-daemon bin/ghostshell-daemon

      - name: Upload binaries
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            build/ghostshell
            build/ghostshell-daemon

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Package
      # ─────────────────────────────────────────────────────────────────────
      - name: Package
        run: |
          mkdir -p release
          rm -f release/*.rpm release/*.deb release/ghostshell-*-linux-amd64 release/SHA256SUMS
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          NFPM="$(go env GOPATH)/bin/nfpm"
          GHOSTSHELL_VERSION="${RELEASE_VERSION}" "$NFPM" pkg --config nfpm.yaml --packager rpm --target release/
          GHOSTSHELL_VERSION="${RELEASE_VERSION}" "$NFPM" pkg --config nfpm.yaml --packager deb --target release/
          cp build/ghostshell "release/ghostshell-${RELEASE_VERSION}-linux-amd64"
          (cd release && sha256sum * > SHA256SUMS)

      - name: Upload packages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: release/*

      # ─────────────────────────────────────────────────────────────────────
      # Stage: Publish GitHub Release  (main branch only)
      # ─────────────────────────────────────────────────────────────────────
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          VERSION="${RELEASE_VERSION}"
          REPO="${GH_REPO}"
          if gh release view "v${VERSION}" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release v${VERSION} already exists — uploading assets"
          else
              gh release create "v${VERSION}" \
                  --repo "$REPO" \
                  --target "$(git rev-parse HEAD)" \
                  --title "v${VERSION}" \
                  --notes "ghostshell ${VERSION}"
          fi
          gh release upload "v${VERSION}" \
              release/*.rpm release/*.deb \
              "release/ghostshell-${VERSION}-linux-amd64" \
              release/SHA256SUMS \
              --repo "$REPO" --clobber
