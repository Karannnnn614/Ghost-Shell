name: CI

# Quality gates for every push and pull request: gofmt, go vet, staticcheck,
# golangci-lint, the full test suite, and a static build.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$unformatted" ]; then
            echo "Not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

      # Install + run golangci-lint with the same Go toolchain as setup-go so it
      # is built against go 1.25 and reads the v1-format .golangci.yml. Pinned to
      # avoid `latest` pulling golangci-lint v2 (incompatible config schema).
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run --timeout 5m ./...

      - name: go test
        run: go test ./... -count=1

      - name: make build
        run: make build
